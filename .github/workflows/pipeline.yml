name: CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "front/**"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "front/**"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Detect which paths changed ──────────────────────────────

  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # dorny/paths-filter compares against the PR base (for pull_request) or
      # the pushed commit range (for push) — NOT just HEAD~1. A previous
      # single-commit `git diff HEAD~1 HEAD` silently skipped a whole suite when
      # a multi-commit push ended on a commit that didn't touch that component.
      - name: Detect changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'front/**'

  # ── Security Scan (Trivy) ───────────────────────────────────

  security-scan:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 0
          format: table

  # ── Backend CI ──────────────────────────────────────────────

  backend:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --frozen --all-extras

      - name: Lint (ruff check)
        run: uv run ruff check majlisna/ tests/

      - name: Format check (ruff format)
        run: uv run ruff format --check majlisna/ tests/

      # --use-postgres spins up a PostgreSQL testcontainer (Docker is available
      # on ubuntu-latest) so the advisory-lock / concurrency tests actually run
      # in CI. Without it those tests are silently skipped.
      - name: Test (pytest, PostgreSQL)
        run: uv run pytest --tb=short -q --no-cov --use-postgres

  # ── Frontend CI ─────────────────────────────────────────────

  frontend:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: front

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (oxlint)
        run: bun run lint

      - name: Type check (tsc)
        run: bun run typecheck

      - name: Test (vitest)
        run: bun run test
