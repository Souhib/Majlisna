name: Pipeline

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "front/**"
      - "docker-compose.dokploy.yml"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "front/**"
  workflow_dispatch:

concurrency:
  group: pipeline
  cancel-in-progress: false

env:
  DEPLOY_DIR: /etc/dokploy/compose/<REDACTED_DOKPLOY_ID>/code
  FRONTEND_IMAGE: ghcr.io/souhib/ipg-frontend

jobs:
  # ── Detect which paths changed ──────────────────────────────

  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changes
        id: filter
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "backend=true" >> $GITHUB_OUTPUT
            echo "frontend=true" >> $GITHUB_OUTPUT
          else
            DIFF=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git diff --name-only HEAD)
            echo "$DIFF" | grep -q '^backend/\|^docker-compose.dokploy.yml' && echo "backend=true" >> $GITHUB_OUTPUT || echo "backend=false" >> $GITHUB_OUTPUT
            echo "$DIFF" | grep -q '^front/\|^docker-compose.dokploy.yml' && echo "frontend=true" >> $GITHUB_OUTPUT || echo "frontend=false" >> $GITHUB_OUTPUT
          fi

  # ── Backend CI ──────────────────────────────────────────────

  backend:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' && github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff check)
        continue-on-error: true
        run: uv run ruff check ipg/ tests/

      - name: Format check (ruff format)
        continue-on-error: true
        run: uv run ruff format --check ipg/ tests/

      - name: Type check (mypy)
        continue-on-error: true
        run: uv run mypy ipg/ --ignore-missing-imports

      - name: Test (pytest)
        continue-on-error: true
        run: uv run pytest --tb=short -q

  # ── Frontend CI ─────────────────────────────────────────────

  frontend:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true' && github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: front

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (oxlint)
        continue-on-error: true
        run: bun run lint

      - name: Type check (tsc)
        continue-on-error: true
        run: bun run typecheck

      - name: Test (vitest)
        continue-on-error: true
        run: bun run test

  # ── Build frontend on x86 (Tailwind CSS v4 Oxide needs x86) ──

  build-frontend:
    runs-on: ubuntu-latest
    needs: changes
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && needs.changes.outputs.frontend == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./front
          file: ./front/Dockerfile
          target: production
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL || 'http://<SERVER_IP>:33648' }}
            VITE_SENTRY_DSN=${{ vars.VITE_SENTRY_DSN || '' }}
            VITE_UMAMI_URL=${{ vars.VITE_UMAMI_URL || '' }}
            VITE_UMAMI_WEBSITE_ID=${{ vars.VITE_UMAMI_WEBSITE_ID || '' }}
            VITE_GOOGLE_MAPS_API_KEY=${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to VPS ───────────────────────────────────────────

  deploy:
    runs-on: self-hosted
    needs: [changes, build-frontend]
    if: |
      always() &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      (needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true') &&
      (needs.build-frontend.result == 'success' || needs.build-frontend.result == 'skipped')
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Sync code to deploy directory
        run: |
          sudo mkdir -p ${{ env.DEPLOY_DIR }}
          sudo rsync -a --delete \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='node_modules' \
            --exclude='__pycache__' \
            --exclude='.git' \
            --exclude='e2e' \
            ./ ${{ env.DEPLOY_DIR }}/

      - name: Build backend image
        if: needs.changes.outputs.backend == 'true'
        working-directory: ${{ env.DEPLOY_DIR }}
        run: docker compose -f docker-compose.dokploy.yml build backend

      - name: Pull frontend image from GHCR
        if: needs.changes.outputs.frontend == 'true'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker pull ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          docker tag ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} code-frontend:latest

      - name: Ensure infrastructure is running
        if: needs.changes.outputs.backend == 'true'
        working-directory: ${{ env.DEPLOY_DIR }}
        run: docker compose -f docker-compose.dokploy.yml up -d db pgbouncer redis

      - name: Wait for PgBouncer health
        if: needs.changes.outputs.backend == 'true'
        working-directory: ${{ env.DEPLOY_DIR }}
        run: |
          echo "Waiting for PgBouncer to be healthy..."
          for i in $(seq 1 12); do
            if docker compose -f docker-compose.dokploy.yml exec -T pgbouncer pg_isready -h 127.0.0.1 -p 6432 > /dev/null 2>&1; then
              echo "PgBouncer is healthy"
              # Check Redis (non-blocking — only for Socket.IO pub/sub)
              if docker compose -f docker-compose.dokploy.yml exec -T redis redis-cli ping 2>/dev/null | grep -q PONG; then
                echo "Redis is healthy"
              else
                echo "WARNING: Redis is not healthy. Socket.IO cross-worker pub/sub will be degraded."
              fi
              exit 0
            fi
            echo "Attempt $i/12: PgBouncer not ready, waiting 5s..."
            sleep 5
          done
          echo "PgBouncer not healthy after 60s"
          docker compose -f docker-compose.dokploy.yml ps
          exit 1

      - name: Deploy backend
        if: needs.changes.outputs.backend == 'true'
        working-directory: ${{ env.DEPLOY_DIR }}
        run: docker compose -f docker-compose.dokploy.yml up -d --no-deps backend

      - name: Deploy frontend
        if: needs.changes.outputs.frontend == 'true'
        working-directory: ${{ env.DEPLOY_DIR }}
        run: docker compose -f docker-compose.dokploy.yml up -d --no-deps frontend

      - name: Health check
        if: needs.changes.outputs.backend == 'true'
        run: |
          echo "Waiting for backend to start..."
          sleep 10
          for i in $(seq 1 6); do
            if curl -sf http://localhost:33648/health > /dev/null 2>&1; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i/6 failed, waiting 10s..."
            sleep 10
          done
          echo "Health check failed after 60s"
          exit 1

      # ── Failure diagnostics ─────────────────────────────────
      - name: Show backend logs on failure
        if: failure() && needs.changes.outputs.backend == 'true'
        working-directory: ${{ env.DEPLOY_DIR }}
        run: docker compose -f docker-compose.dokploy.yml logs --tail=50 backend

      - name: Show infrastructure logs on failure
        if: failure() && needs.changes.outputs.backend == 'true'
        working-directory: ${{ env.DEPLOY_DIR }}
        run: |
          echo "=== PgBouncer ===" && docker compose -f docker-compose.dokploy.yml logs --tail=20 pgbouncer
          echo "=== Redis ===" && docker compose -f docker-compose.dokploy.yml logs --tail=20 redis
          echo "=== DB ===" && docker compose -f docker-compose.dokploy.yml logs --tail=20 db
          echo "=== Container status ===" && docker compose -f docker-compose.dokploy.yml ps

      - name: Show frontend logs on failure
        if: failure() && needs.changes.outputs.frontend == 'true'
        working-directory: ${{ env.DEPLOY_DIR }}
        run: docker compose -f docker-compose.dokploy.yml logs --tail=50 frontend

      - name: Cleanup old images
        if: always()
        run: docker image prune -f
