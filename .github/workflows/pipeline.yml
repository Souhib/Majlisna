name: Pipeline

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "front/**"
      - "docker-compose.dokploy.yml"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "front/**"
  workflow_dispatch:

concurrency:
  group: pipeline
  cancel-in-progress: false

env:
  DEPLOY_DIR: /etc/dokploy/compose/<REDACTED_DOKPLOY_ID>/code

jobs:
  # ── Detect which paths changed ──────────────────────────────

  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changes
        id: filter
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "backend=true" >> $GITHUB_OUTPUT
            echo "frontend=true" >> $GITHUB_OUTPUT
          else
            DIFF=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git diff --name-only HEAD)
            echo "$DIFF" | grep -q '^backend/\|^docker-compose.dokploy.yml' && echo "backend=true" >> $GITHUB_OUTPUT || echo "backend=false" >> $GITHUB_OUTPUT
            echo "$DIFF" | grep -q '^front/\|^docker-compose.dokploy.yml' && echo "frontend=true" >> $GITHUB_OUTPUT || echo "frontend=false" >> $GITHUB_OUTPUT
          fi

  # ── Security Scan (Trivy) ───────────────────────────────────

  security-scan:
    runs-on: ubuntu-latest
    needs: changes
    if: (needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true') && github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 0
          format: table

  # ── Backend CI ──────────────────────────────────────────────

  backend:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' && github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff check)
        continue-on-error: true
        run: uv run ruff check ipg/ tests/

      - name: Format check (ruff format)
        continue-on-error: true
        run: uv run ruff format --check ipg/ tests/

      - name: Type check (mypy)
        continue-on-error: true
        run: uv run mypy ipg/ --ignore-missing-imports

      - name: Test (pytest)
        continue-on-error: true
        run: uv run pytest --tb=short -q

  # ── Frontend CI ─────────────────────────────────────────────

  frontend:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true' && github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: front

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (oxlint)
        continue-on-error: true
        run: bun run lint

      - name: Type check (tsc)
        continue-on-error: true
        run: bun run typecheck

      - name: Test (vitest)
        continue-on-error: true
        run: bun run test

  # ── Deploy to VPS ───────────────────────────────────────────

  deploy:
    runs-on: self-hosted
    needs: changes
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Sync code to deploy directory
        run: |
          sudo mkdir -p ${{ env.DEPLOY_DIR }}
          sudo rsync -a --delete \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='node_modules' \
            --exclude='__pycache__' \
            --exclude='.venv' \
            --exclude='.git' \
            --exclude='e2e' \
            ./ ${{ env.DEPLOY_DIR }}/

      - name: Build backend image (with layer caching)
        if: needs.changes.outputs.backend == 'true'
        working-directory: ${{ env.DEPLOY_DIR }}
        env:
          DOCKER_BUILDKIT: 1
          COMPOSE_DOCKER_CLI_BUILD: 1
        run: docker compose -f docker-compose.dokploy.yml build backend

      - name: Scan backend image with Trivy
        if: needs.changes.outputs.backend == 'true'
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest image --severity HIGH,CRITICAL --exit-code 0 \
            majlisna-backend:latest 2>/dev/null || true

      - name: Build frontend image (with layer caching)
        if: needs.changes.outputs.frontend == 'true'
        working-directory: ${{ env.DEPLOY_DIR }}
        env:
          DOCKER_BUILDKIT: 1
          COMPOSE_DOCKER_CLI_BUILD: 1
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
        run: docker compose -f docker-compose.dokploy.yml build frontend

      - name: Ensure infrastructure is running
        if: needs.changes.outputs.backend == 'true'
        working-directory: ${{ env.DEPLOY_DIR }}
        run: |
          output=$(docker compose -f docker-compose.dokploy.yml up -d db pgbouncer redis 2>&1) && exit 0
          if echo "$output" | grep -q "is already in use"; then
            echo "Infrastructure containers already running (managed by Dokploy)"
          else
            echo "$output"
            exit 1
          fi

      - name: Wait for PgBouncer health
        if: needs.changes.outputs.backend == 'true'
        working-directory: ${{ env.DEPLOY_DIR }}
        run: |
          echo "Waiting for PgBouncer to be healthy..."
          for i in $(seq 1 12); do
            if docker compose -f docker-compose.dokploy.yml exec -T pgbouncer pg_isready -h 127.0.0.1 -p 6432 > /dev/null 2>&1; then
              echo "PgBouncer is healthy"
              # Check Redis (non-blocking — only for Socket.IO pub/sub)
              if docker compose -f docker-compose.dokploy.yml exec -T redis redis-cli ping 2>/dev/null | grep -q PONG; then
                echo "Redis is healthy"
              else
                echo "WARNING: Redis is not healthy. Socket.IO cross-worker pub/sub will be degraded."
              fi
              exit 0
            fi
            echo "Attempt $i/12: PgBouncer not ready, waiting 5s..."
            sleep 5
          done
          echo "PgBouncer not healthy after 60s"
          docker compose -f docker-compose.dokploy.yml ps
          exit 1

      - name: Deploy backend
        if: needs.changes.outputs.backend == 'true'
        working-directory: ${{ env.DEPLOY_DIR }}
        run: docker compose -f docker-compose.dokploy.yml up -d --no-deps backend

      - name: Deploy frontend
        if: needs.changes.outputs.frontend == 'true'
        working-directory: ${{ env.DEPLOY_DIR }}
        run: docker compose -f docker-compose.dokploy.yml up -d --no-deps frontend

      - name: Ensure monitoring tools are running
        working-directory: ${{ env.DEPLOY_DIR }}
        run: |
          output=$(docker compose -f docker-compose.dokploy.yml up -d dozzle uptime-kuma beszel beszel-agent watchtower crowdsec 2>&1) && exit 0
          if echo "$output" | grep -q "is already in use"; then
            echo "Monitoring containers already running (managed by Dokploy)"
          else
            echo "$output"
            exit 1
          fi

      - name: Health check
        if: needs.changes.outputs.backend == 'true'
        run: |
          echo "Waiting for backend to start..."
          sleep 10
          for i in $(seq 1 6); do
            if curl -sf http://localhost:33648/health > /dev/null 2>&1; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i/6 failed, waiting 10s..."
            sleep 10
          done
          echo "Health check failed after 60s"
          exit 1

      # ── Failure diagnostics ─────────────────────────────────
      - name: Show backend logs on failure
        if: failure() && needs.changes.outputs.backend == 'true'
        working-directory: ${{ env.DEPLOY_DIR }}
        run: docker compose -f docker-compose.dokploy.yml logs --tail=50 backend

      - name: Show infrastructure logs on failure
        if: failure() && needs.changes.outputs.backend == 'true'
        working-directory: ${{ env.DEPLOY_DIR }}
        run: |
          echo "=== PgBouncer ===" && docker compose -f docker-compose.dokploy.yml logs --tail=20 pgbouncer
          echo "=== Redis ===" && docker compose -f docker-compose.dokploy.yml logs --tail=20 redis
          echo "=== DB ===" && docker compose -f docker-compose.dokploy.yml logs --tail=20 db
          echo "=== Container status ===" && docker compose -f docker-compose.dokploy.yml ps

      - name: Show frontend logs on failure
        if: failure() && needs.changes.outputs.frontend == 'true'
        working-directory: ${{ env.DEPLOY_DIR }}
        run: docker compose -f docker-compose.dokploy.yml logs --tail=50 frontend

      - name: Cleanup old images
        if: always()
        run: docker image prune -f
