name: E2E Tests

on:
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "front/**"
      - "e2e/**"
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: self-hosted
    timeout-minutes: 20
    defaults:
      run:
        working-directory: e2e

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Start E2E services ───────────────────────────────────

      - name: Start E2E Docker services
        run: docker compose -f docker-compose.e2e.yml up -d --build --wait
        timeout-minutes: 10

      - name: Wait for backend health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5049/health > /dev/null 2>&1; then
              echo "Backend is healthy"
              exit 0
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done
          echo "Backend failed to start"
          docker compose -f docker-compose.e2e.yml logs backend
          exit 1

      - name: Wait for frontend
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3049 > /dev/null 2>&1; then
              echo "Frontend is reachable"
              exit 0
            fi
            echo "Waiting for frontend... ($i/30)"
            sleep 2
          done
          echo "Frontend failed to start"
          docker compose -f docker-compose.e2e.yml logs frontend
          exit 1

      # ── Install test dependencies ────────────────────────────

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install chromium --with-deps

      # ── Seed database ────────────────────────────────────────

      - name: Seed E2E database
        run: |
          docker exec -w /app ipg-e2e-backend env PYTHONPATH=/app python scripts/generate_fake_data.py --delete
          docker exec -w /app ipg-e2e-backend env PYTHONPATH=/app python scripts/generate_fake_data.py --create-db

      # ── Run tests ────────────────────────────────────────────

      - name: Run E2E tests
        run: bunx playwright test --reporter=html,github
        continue-on-error: true
        env:
          CI: true

      # ── Upload report ────────────────────────────────────────

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

      # ── Cleanup ──────────────────────────────────────────────

      - name: Cleanup Docker services
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v
