# IBG - E2E Testing Docker Compose
# Non-standard ports to avoid conflicts with local dev (54331, 63791, 5051, 3051)
# Usage: docker compose -f docker-compose.e2e.yml up -d --build

services:
  # ─── Database ─────────────────────────────────────────────

  db:
    image: postgres:16-alpine
    container_name: ibg-e2e-db
    environment:
      POSTGRES_USER: ibg
      POSTGRES_PASSWORD: ibg
      POSTGRES_DB: ibg
    ports:
      - "54339:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ibg"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ibg-e2e-network

  # ─── Redis Stack ──────────────────────────────────────────

  redis:
    image: redis/redis-stack:latest
    container_name: ibg-e2e-redis
    environment:
      - REDIS_ARGS=--stop-writes-on-bgsave-error no
    ports:
      - "63799:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ibg-e2e-network

  # ─── Backend API ──────────────────────────────────────────

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: production
      args:
        INSTALL_DEV: "true"
    container_name: ibg-e2e-backend
    ports:
      - "5049:5000"
    environment:
      DATABASE_URL: postgresql+asyncpg://ibg:ibg@db:5432/ibg
      REDIS_OM_URL: redis://redis:6379
      ENVIRONMENT: development
      IBG_ENV: development
      JWT_SECRET_KEY: e2e-secret-key
      CORS_ORIGINS: "*"
      LOG_LEVEL: WARNING
      DISCONNECT_GRACE_PERIOD_SECONDS: "30"
      GAME_FINISHED_TTL: "5"
      RATE_LIMIT_ENABLED: "false"
      SIO_PING_INTERVAL: "10"
      SIO_PING_TIMEOUT: "5"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - ibg-e2e-network

  # ─── Frontend SPA ─────────────────────────────────────────

  frontend:
    build:
      context: ../front
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_URL: http://localhost:5049
    container_name: ibg-e2e-frontend
    ports:
      - "3049:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ibg-e2e-network

networks:
  ibg-e2e-network:
    driver: bridge
