# IPG - E2E Testing Docker Compose
# Non-standard ports to avoid conflicts with local dev (54339, 5049, 3049)
# Usage: docker compose -f docker-compose.e2e.yml up -d --build

services:
  # ─── Database ─────────────────────────────────────────────

  db:
    image: postgres:16-alpine
    container_name: ipg-e2e-db
    environment:
      POSTGRES_USER: ipg
      POSTGRES_PASSWORD: ipg
      POSTGRES_DB: ipg
    ports:
      - "54339:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ipg"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ipg-e2e-network

  # ─── Backend API ──────────────────────────────────────────

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: production
      args:
        INSTALL_DEV: "true"
    container_name: ipg-e2e-backend
    ports:
      - "5049:5000"
    environment:
      DATABASE_URL: postgresql+asyncpg://ipg:ipg@db:5432/ipg
      ENVIRONMENT: development
      IPG_ENV: development
      JWT_SECRET_KEY: e2e-secret-key
      CORS_ORIGINS: "*"
      LOG_LEVEL: WARNING
      DISCONNECT_GRACE_PERIOD_SECONDS: "30"
      HEARTBEAT_STALE_SECONDS: "10"
      RATE_LIMIT_ENABLED: "false"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - ipg-e2e-network

  # ─── Frontend SPA ─────────────────────────────────────────

  frontend:
    build:
      context: ../front
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_URL: http://localhost:5049
    container_name: ipg-e2e-frontend
    ports:
      - "3049:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ipg-e2e-network

networks:
  ipg-e2e-network:
    driver: bridge
