# IPG - Local Development Docker Compose
# Usage: docker compose up -d

services:
  # ─── Database ─────────────────────────────────────────────

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ipg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ipg}
      POSTGRES_DB: ${POSTGRES_DB:-ipg}
    ports:
      - "54331:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ipg"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── PgBouncer ────────────────────────────────────────────

  pgbouncer:
    image: edoburu/pgbouncer:v1.25.1-p0
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-ipg}:${POSTGRES_PASSWORD:-ipg}@db:5432/${POSTGRES_DB:-ipg}
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: 20
      MAX_CLIENT_CONN: 200
      LISTEN_PORT: 6432
      AUTH_TYPE: scram-sha-256
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "127.0.0.1", "-p", "6432"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Redis ───────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ─── Backend API ──────────────────────────────────────────

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    ports:
      - "5051:5000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ipg}:${POSTGRES_PASSWORD:-ipg}@pgbouncer:6432/${POSTGRES_DB:-ipg}
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
      IPG_ENV: development
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-key-change-me}
      CORS_ORIGINS: "http://localhost:3000,http://localhost:3051"
      LOG_LEVEL: DEBUG
      SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ─── Frontend SPA ─────────────────────────────────────────

  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_URL: http://localhost:5051
        VITE_UMAMI_URL: ${VITE_UMAMI_URL:-http://localhost:3100}
        VITE_UMAMI_WEBSITE_ID: ${VITE_UMAMI_WEBSITE_ID:-}
    ports:
      - "3051:80"
    depends_on:
      - backend
    restart: unless-stopped

  # ─── Umami Analytics ──────────────────────────────────────

  umami-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: ${UMAMI_DB_PASSWORD:-umami}
      POSTGRES_DB: umami
    volumes:
      - umami_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    environment:
      DATABASE_URL: postgresql://umami:${UMAMI_DB_PASSWORD:-umami}@umami-db:5432/umami
    ports:
      - "3100:3000"
    depends_on:
      umami-db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  umami_pgdata:
