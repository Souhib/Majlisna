# Dokploy deployment for Majlisna (IPG)
# App-only compose — monitoring services live in ~/monitoring/docker-compose.yml on the server

name: majlisna

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "100m"
    max-file: "5"

services:
  # ─── Database ────────────────────────────────────────────────
  db:
    container_name: majlisna-db
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ipg
      POSTGRES_USER: ipg
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ipg"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 10
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - internal
    logging: *default-logging
    restart: always

  # ─── PgBouncer ───────────────────────────────────────────────
  pgbouncer:
    container_name: majlisna-pgbouncer
    image: edoburu/pgbouncer:v1.25.1-p0
    environment:
      DATABASE_URL: postgres://ipg:${DB_PASSWORD}@db:5432/ipg
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: 20
      MAX_CLIENT_CONN: 200
      LISTEN_PORT: 6432
      AUTH_TYPE: scram-sha-256
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "127.0.0.1", "-p", "6432"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal
    logging: *default-logging
    restart: always

  # ─── Redis (Socket.IO pub/sub only) ──────────────────────────
  redis:
    container_name: majlisna-redis
    image: redis:7-alpine
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal
    logging: *default-logging
    restart: always

  # ─── Backend API ─────────────────────────────────────────────
  backend:
    container_name: majlisna-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    environment:
      DATABASE_URL: postgresql+asyncpg://ipg:${DB_PASSWORD}@pgbouncer:6432/ipg
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ENCRYPTION_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      FRONTEND_URL: ${FRONTEND_URL:-http://<SERVER_IP>:30819}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://<SERVER_IP>:30819}
      LOGFIRE_TOKEN: ${LOGFIRE_TOKEN:-}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      IPG_ENV: ${IPG_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SENTRY_DSN: ${SENTRY_DSN:-}
      GOOGLE_CLIENT_ID_WEB: ${GOOGLE_CLIENT_ID_WEB:-}
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    ports:
      - "33648:5000"
    labels:
      - "traefik.enable=${TRAEFIK_ENABLED:-false}"
      - "traefik.http.routers.ipg-backend.rule=(Host(`${DOMAIN:-ipg.local}`) && (PathPrefix(`/api`) || PathPrefix(`/socket.io`) || PathPrefix(`/health`) || PathPrefix(`/scalar`) || PathPrefix(`/openapi.json`))) || Host(`api.${DOMAIN:-ipg.local}`)"
      - "traefik.http.routers.ipg-backend.entrypoints=web,websecure"
      - "traefik.http.services.ipg-backend.loadbalancer.server.port=5000"
    networks:
      - internal
      - dokploy-network
    logging: *default-logging
    restart: always

  # ─── Frontend SPA ────────────────────────────────────────────
  frontend:
    container_name: majlisna-frontend
    build:
      context: ./front
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL:-http://<SERVER_IP>:33648}
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
        VITE_UMAMI_URL: ${VITE_UMAMI_URL:-}
        VITE_UMAMI_WEBSITE_ID: ${VITE_UMAMI_WEBSITE_ID:-}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    ports:
      - "30819:80"
    labels:
      - "traefik.enable=${TRAEFIK_ENABLED:-false}"
      - "traefik.http.routers.ipg-frontend.rule=Host(`${DOMAIN:-ipg.local}`)"
      - "traefik.http.routers.ipg-frontend.entrypoints=web,websecure"
      - "traefik.http.services.ipg-frontend.loadbalancer.server.port=80"
    networks:
      - internal
      - dokploy-network
    logging: *default-logging
    restart: always

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge
  dokploy-network:
    external: true
