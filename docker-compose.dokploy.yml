# Dokploy deployment for IPG
# Access via IP:
#   - Frontend: http://<SERVER_IP>:30819
#   - Backend:  http://<SERVER_IP>:33648

services:
  # ─── Databases (internal only) ───────────────────────────────

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ipg
      POSTGRES_USER: ipg
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ipg"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    restart: always

  redis:
    image: redis/redis-stack-server:latest
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    restart: always

  # ─── Backend API ─────────────────────────────────────────────

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    environment:
      DATABASE_URL: postgresql+asyncpg://ipg:${DB_PASSWORD}@db:5432/ipg
      REDIS_URL: redis://redis:6379

      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ENCRYPTION_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}

      FRONTEND_URL: ${FRONTEND_URL:-http://<SERVER_IP>:30819}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://<SERVER_IP>:30819}

      LOGFIRE_TOKEN: ${LOGFIRE_TOKEN:-}

      ENVIRONMENT: ${ENVIRONMENT:-production}
      IPG_ENV: ${IPG_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "33648:5000"
    labels:
      - "traefik.enable=${TRAEFIK_ENABLED:-false}"
      - "traefik.http.routers.ipg-backend.rule=Host(`${DOMAIN:-ipg.local}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.ipg-backend.entrypoints=websecure"
      - "traefik.http.routers.ipg-backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.ipg-backend.loadbalancer.server.port=5000"
    networks:
      - internal
      - dokploy-network
    restart: always

  # ─── Frontend SPA ────────────────────────────────────────────

  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL:-http://<SERVER_IP>:33648}
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
        VITE_UMAMI_URL: ${VITE_UMAMI_URL:-}
        VITE_UMAMI_WEBSITE_ID: ${VITE_UMAMI_WEBSITE_ID:-}
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY:-}
    depends_on:
      - backend
    ports:
      - "30819:80"
    labels:
      - "traefik.enable=${TRAEFIK_ENABLED:-false}"
      - "traefik.http.routers.ipg-frontend.rule=Host(`${DOMAIN:-ipg.local}`)"
      - "traefik.http.routers.ipg-frontend.entrypoints=websecure"
      - "traefik.http.routers.ipg-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.ipg-frontend.loadbalancer.server.port=80"
    networks:
      - internal
      - dokploy-network
    restart: always

  # ─── Umami Analytics ─────────────────────────────────────────

  umami-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: ${UMAMI_DB_PASSWORD}
      POSTGRES_DB: umami
    volumes:
      - umami_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    restart: always

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    environment:
      DATABASE_URL: postgresql://umami:${UMAMI_DB_PASSWORD}@umami-db:5432/umami
    depends_on:
      umami-db:
        condition: service_healthy
    ports:
      - "3100:3000"
    networks:
      - internal
      - dokploy-network
    restart: always

volumes:
  postgres_data:
  redis_data:
  umami_postgres_data:

networks:
  internal:
    driver: bridge
  dokploy-network:
    external: true
